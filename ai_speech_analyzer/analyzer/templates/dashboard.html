{% extends 'base.html' %}

{% block content %}
<div class="row mb-5 text-center">
    <h2>Improvement Dashboard</h2>
    <p class="text-muted">Track your progress over time</p>
</div>

<div class="row g-4">

    <!-- Confidence Over Time Chart -->
    <div class="col-lg-8">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                Confidence Score Trend
            </div>
            <div class="card-body">
                <canvas id="confidenceChart" height="150"></canvas>
            </div>
        </div>
    </div>

    <!-- Speed Tracking Chart -->
    <div class="col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-info text-white">
                Speech Speed Tracking
            </div>
            <div class="card-body">
                <canvas id="speedChart" height="250"></canvas>
            </div>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}

<script>

const dates = JSON.parse('{{ dates|default:"[]"|escapejs }}');
const scores = JSON.parse('{{ scores|default:"[]"|escapejs }}');
const speeds = JSON.parse('{{ speeds|default:"[]"|escapejs }}');

// Confidence Chart
const ctxConfidence = document.getElementById('confidenceChart').getContext('2d');

new Chart(ctxConfidence, {
    type: 'line',
    data: {
        labels: dates,
        datasets: [{
            label: 'Confidence Score',
            data: scores,
            borderColor: '#198754',
            backgroundColor: 'rgba(25,135,84,0.2)',
            borderWidth: 3,
            fill: true,
            tension: 0.3
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                min: 0,
                max: 100
            }
        }
    }
});


// Speed Chart
const ctxSpeed = document.getElementById('speedChart').getContext('2d');

new Chart(ctxSpeed, {
    type: 'bar',
    data: {
        labels: dates,
        datasets: [{
            label: 'Speech Speed (WPM)',
            data: speeds,
            backgroundColor: '#0dcaf0'
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

</script>

{% endblock %}
